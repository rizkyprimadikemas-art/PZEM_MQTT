<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantabura EMS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
<div class="card">
<div class="logo">
⚡
</div>

<h1>

LANTABURA EMS

</h1>

<p class="subtitle">

WiFi Configuration

</p>

<div class="section">

<label>

Available WiFi

</label>

<div id="wifiList">

<div class="loading">

Scanning...

</div>

</div>

</div>

<div class="section">

<label>

SSID

</label>

<input

id="ssid"

type="text"

placeholder="WiFi Name">

</div>

<div class="section">

<label>

Password

</label>

<div class="passwordBox">

<input

id="password"

type="password"

placeholder="Password">

<button
type="button"
id="togglePassword">

👁

</button>

</div>

</div>

<button

id="connectButton">

CONNECT

</button>

<div

id="status"

class="status">

Ready

</div>

<hr>

<div class="device">

<h3>

Device Information

</h3>

<table>

<tr>

<td>

MAC

</td>

<td id="mac">

-

</td>

</tr>

<tr>

<td>

IP

</td>

<td id="ip">

-

</td>

</tr>

<tr>

<td>

Connected

</td>

<td id="connected">

NO

</td>

</tr>

</table>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
